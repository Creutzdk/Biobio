<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Malling Bio – Timer Integration</title>
<style>
body{font-family:-apple-system,system-ui;margin:0;padding:20px;background:#0b0b12;color:#fff}
.card{background:#151522;padding:16px;border-radius:16px;margin-bottom:16px}
input{width:100%;padding:12px;margin-top:6px;border-radius:10px;border:1px solid #333;background:#000;color:#fff}
button{padding:12px;border-radius:10px;border:none;margin-top:10px;width:100%;font-weight:bold}
.primary{background:#ffcc00;color:#000}
.copy{background:#2ee59d;color:#000}
.big{font-size:24px;margin-top:10px}
</style>
</head>
<body>

<h2>🎬 Malling Bio – Timer Integration</h2>

<div class="card">
<h3>Sal 1</h3>
<label>Nået til</label>
<input id="c1" placeholder="0:45:50">
<label>Tænd lys ved</label>
<input id="t1" placeholder="2:03:30">
<button class="primary" onclick="calc('1')">Beregn</button>
<div class="big" id="r1">—</div>
<button class="copy" onclick="copy('1')">📋 Kopiér sekunder</button>
</div>

<div class="card">
<h3>Sal 2</h3>
<label>Nået til</label>
<input id="c2" placeholder="0:10:00">
<label>Tænd lys ved</label>
<input id="t2" placeholder="1:40:00">
<button class="primary" onclick="calc('2')">Beregn</button>
<div class="big" id="r2">—</div>
<button class="copy" onclick="copy('2')">📋 Kopiér sekunder</button>
</div>

<script>
function parse(t){
 let p=t.split(":").map(Number);
 if(p.length==3)return p[0]*3600+p[1]*60+p[2];
 if(p.length==2)return p[0]*60+p[1];
 return p[0];
}
function calc(n){
 let c=parse(document.getElementById("c"+n).value||"0");
 let t=parse(document.getElementById("t"+n).value||"0");
 let d=t-c;
 document.getElementById("r"+n).innerText=d+" sek";
 window["sec"+n]=d;
}
function copy(n){
 let val=window["sec"+n]||0;
 navigator.clipboard.writeText(val);
 alert("Kopieret: "+val+" sek
Brug i Genveje eller Siri");
}
</script>

</body>
</html>
